rag:
  method: "light"
  name: "lightrag"

lightrag:
  working_dir: "./src/LightRAG/dickens"
  mode: "hybrid"
  ollama_host: "http://localhost:11434"
  llm_model_max_async: 1
  max_parallel_insert: 1
  default_llm_timeout: 600
  verbose_debug: false

index:
  rebuild: false

data:
  source_path: "../../notebooks_sandbox/datasets/newSpeak1984_rt.txt"
  encoding: "utf-8"

query:
  text: "What are the top themes in this text?"
  stream: false
  enable_rerank: false
